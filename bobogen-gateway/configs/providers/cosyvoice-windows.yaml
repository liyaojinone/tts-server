provider_id: local_cosyvoice2
provider_type: cosyvoice
display_name: CosyVoice Default
enabled: true
runtime:
  root_dir: ${BOBOGEN_ROOT}\services\cosyvoice-service
  cwd: ${BOBOGEN_ROOT}\services\cosyvoice-service
  command:
    - powershell
    - -File
    - ${BOBOGEN_ROOT}\services\cosyvoice-service\start.ps1
  env:
    COSYVOICE_REPO_DIR: "${BOBOGEN_ROOT}\\models\\cosyvoice\\repo"
  startup_timeout_ms: 120000
  request_timeout_ms: 180000
  idle_shutdown_seconds: 0
network:
  host: 127.0.0.1
  port: 5101
  base_url: http://127.0.0.1:5101
  healthcheck_path: /v1/health
capabilities:
  voices: true
  synthesize: true
  clone: true
  stream: false
voices:
  - voice_id: 中文女
    name: 中文女
    language: [zh]
    gender: female
    description: CosyVoice 预置音色
    tags: [preset]
    metadata: {}
