provider_id: local_voxcpm
provider_type: voxcpm
display_name: VoxCPM2 Default
enabled: true
runtime:
  root_dir: E:\AiModel\tts-server\services\voxcpm-service
  cwd: E:\AiModel\tts-server\services\voxcpm-service
  command:
    - powershell
    - -File
    - E:\AiModel\tts-server\services\voxcpm-service\start.ps1
  env:
    VOXCPM_REPO_DIR: "E:\\AiModel\\tts-server\\models\\voxcpm\\repo"
    VOXCPM_MODEL_DIR: "E:\\AiModel\\tts-server\\models\\voxcpm\\checkpoints"
    VOXCPM_PRELOAD_ON_STARTUP: "true"
  startup_timeout_ms: 180000
  request_timeout_ms: 300000
  idle_shutdown_seconds: 0
network:
  host: 127.0.0.1
  port: 5105
  base_url: http://127.0.0.1:5105
  healthcheck_path: /v1/health
capabilities:
  voices: true
  synthesize: true
  clone: true
  stream: false
voices:
  - voice_id: voxcpm2-default
    name: VoxCPM2 Default
    language: [zh, en, ja, ko]
    description: VoxCPM2 instruction-first synthesis mode
    tags: [default, design]
    metadata: {}
