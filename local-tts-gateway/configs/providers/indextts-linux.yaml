provider_id: indextts-default
provider_type: indextts
display_name: IndexTTS Default
enabled: true
runtime:
  root_dir: /home/tts-server/services/index-tts-service
  cwd: /home/tts-server/services/index-tts-service
  command:
    - /home/tts-server/models/index-tts/repo/.venv/bin/python
    - -m
    - uvicorn
    - app.main:create_app
    - --factory
    - --host
    - 127.0.0.1
    - --port
    - "5104"
  env:
    PYTHONPATH: /home/tts-server/services/index-tts-service:/home/tts-server/local-tts-protocol/src:/home/tts-server/local-tts-service-kit/src:/home/tts-server/models/index-tts/repo
    INDEXTTS_REPO_DIR: /home/tts-server/models/index-tts/repo
    INDEXTTS_MODEL_DIR: /home/tts-server/models/index-tts/checkpoints
    INDEXTTS_PROFILE_DIR: /home/tts-server/services/index-tts-service/data/profiles
    INDEXTTS_OUTPUT_DIR: /home/tts-server/models/index-tts/outputs
    INDEXTTS_USE_FP16: "true"
    INDEXTTS_USE_CUDA_KERNEL: "true"
    INDEXTTS_USE_DEEPSPEED: "false"
    INDEXTTS_USE_ACCEL: "false"
    INDEXTTS_USE_TORCH_COMPILE: "false"
    INDEXTTS_PRELOAD_ON_STARTUP: "true"
  startup_timeout_ms: 180000
  request_timeout_ms: 600000
  idle_shutdown_seconds: 0
network:
  host: 127.0.0.1
  port: 5104
  base_url: http://127.0.0.1:5104
  healthcheck_path: /v1/health
capabilities:
  voices: true
  synthesize: true
  clone: true
  stream: false
voices:
  - voice_id: index-default
    name: IndexTTS Default
    language: [zh, en]
    description: IndexTTS2 reference-driven synthesis mode
    tags: [reference, default]
    metadata: {}
